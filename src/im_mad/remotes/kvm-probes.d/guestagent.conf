# This file controls the monitoring information received from the qemu-guest agent
# inside the VMs.

# Enable or disable monitoring information from the qemu guest agent.
:enabled: false

# Commands used to gather VM information.
# Each command key will appear on the MONITORING message from the poll probe
# The value will be run as a command executed with virsh qemu-agent-command
# The $vm_id substring, if existing, will be replaced by the VM ID when the monitoring probes
# are looping on each of the VMs on the host. Each command will be run once per VM.
# The expected response for each command is a JSON string with a "return" key.
# The contents of it will appear on the MONITORING message from the poll probe.
#
# SYNTAX OPTIONS (can be mixed):
# ===============
#
# Simple syntax:
#   :command_name: one-$vm_id '{"execute":"guest-ping"}' --timeout 5
#
# Alternative syntax for OS filtering:
#   :command_name:
#     command: one-$vm_id '{"execute":"guest-ping"}' --timeout 5
#     filter1: ['val1']
#     filter2: ['val1', 'val2']
#     ...
#
# Filtering works by previously extracting and storing special OS_ attributes from
# `guest-get-osinfo`, whose values will then be used to check each condition. They can also be
# accessed in the MONITORING section. The corresponding attribute must then match exactly (case
# sensitive) one of the given filters for the VM to be eligible to run the command. Providing
# several filters requires the VM to match each of them.
#
# This table summarizes the available filters and corresponding OS monitoring attributes:
#
# | Filter      | Attribute Matched | Possible Values                          | Comments                                |
# | ----------- | ----------------- | ---------------------------------------- | --------------------------------------- |
# | os_types    | OS_TYPE           | `posix`, `mswindows`                     |                                         |
# | os_ids      | OS_ID             | OS/distro ID (e.g., `ubuntu`, `freebsd`) | From os-release(5) ID attribute         |
# | os_versions | OS_VERSION        | Version ID (e.g., `3.20.9`, `24.04`)     | From os-release(5) VERSION_ID attribute |
# | os_machines | OS_MACHINE        | Architecture (e.g., `x86_64`, `amd64`)   | From `uname -m`                         |
#
# Values will be 'unknown' if not provided by qemu-guest-agent.
#
:commands:
  # String syntax - runs on all VMs
  :vm_qemu_ping: one-$vm_id '{"execute":"guest-ping"}' --timeout 5

  # Hash syntax examples (with OS filtering):
  #
  # Simple command without filters - runs on all VMs
  # :vm_simple:
  #   :command: one-$vm_id '{"execute":"guest-ping"}' --timeout 5
  #
  # Example: Run only on POSIX amd64
  # :vm_posix_amd64:
  #   :command: one-$vm_id '{"execute":"guest-exec","arguments":{"path":"/usr/bin/uname","arg":["-a"]}}' --timeout 10
  #   :os_types: [posix]
  #   :os_machines: [x86_64, amd64]
  #
  # Example: Run only on Windows
  # :vm_windows_only:
  #   :command: one-$vm_id '{"execute":"guest-exec","arguments":{"path":"C:\\Windows\\System32\\cmd.exe","arg":["/c","echo hello"]}}' --timeout 10
  #   :os_types: [mswindows]
  #
  # Example: Run only on specific OS versions
  # :vm_ubuntu_22_24:
  #   :command: one-$vm_id '{"execute":"guest-exec","arguments":{"path":"/usr/bin/cat","arg":["/etc/os-release"]}}' --timeout 10
  #   :os_ids: [ubuntu]
  #   :os_versions: ['24.04', '22.04']
